name: Refresh Forecast (manual fallback)

# Inference moved to Kaggle (kaggle_runner.ipynb) for free GPU. This workflow
# stays as a CPU-only fallback you can fire by hand from the Actions tab.
# The 12-hour schedule was disabled because each CPU run took ~2h and hit the
# 60-min GitHub Actions timeout before completing both BTC and ETH.
on:
  workflow_dispatch:

permissions:
  contents: write             # needed so the workflow can push back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60       # Kronos-Base on CPU can take 20-30 min per run

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Kronos-Base model weights
        uses: actions/cache@v4
        with:
          path: ./Kronos_model
          key: kronos-base-weights-v1

      - name: Run forecast
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python update_predictions.py

      - name: Commit and push refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prediction_chart_btcusd.png prediction_chart_ethusd.png index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh forecast [skip ci]"
            git push
          fi
